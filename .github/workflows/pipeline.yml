name: Hotel Management CI/CD

on:
  push:
    branches:
      - master

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN || 'arn:aws:iam::876784288644:role/bootcamp-oidc' }}
  S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME || 'bootcamp1-frontend' }}
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID || 'i-009b8a8fd853b573d' }}
  REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL || 'http://ec2-3-234-154-249.compute-1.amazonaws.com:3000' }}
  RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT || 'bootcampdatabase-1.cqxgwyy6yzth.us-east-1.rds.amazonaws.com' }}
  DB_NAME: ${{ secrets.DB_NAME || 'postgres' }}
  DB_USER: ${{ secrets.DB_USER || 'postgres' }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'Bootcamp#123' }}

permissions:
  id-token: write
  contents: read

jobs:
  # ─── Frontend: Build & Deploy to S3 ────────────────────────────────────────
  deploy-frontend:
    if: false
    name: Build & Deploy Frontend to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app
        working-directory: frontend
        env:
          REACT_APP_API_URL: ${{ env.REACT_APP_API_URL }}
        run: npm run build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/build/ s3://${{ env.S3_BUCKET_NAME }} --delete

  # ─── Backend: Build & Deploy to EC2 ────────────────────────────────────────
  deploy-backend:
    name: Build & Deploy Backend to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build TypeScript
        working-directory: backend
        run: npm run build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install SSM plugin
        run: |
          curl -s "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o session-manager-plugin.deb
          sudo dpkg -i session-manager-plugin.deb

      - name: Upload build to S3 artifact bucket
        run: |
          zip -r backend-build.zip backend/dist backend/package.json backend/package-lock.json
          aws s3 cp backend-build.zip s3://${{ env.S3_BUCKET_NAME }}/deployments/backend-build.zip

      - name: Write .env and upload to S3
        run: |
          cat > backend.env <<EOF
          PORT=3000
          DB_HOST=${{ env.RDS_ENDPOINT }}
          DB_PORT=5432
          DB_NAME=${{ env.DB_NAME }}
          DB_USER=${{ env.DB_USER }}
          DB_PASSWORD=${{ env.DB_PASSWORD }}
          DB_DIALECT=postgres
          EOF
          aws s3 cp backend.env s3://${{ env.S3_BUCKET_NAME }}/deployments/backend.env

      - name: Deploy on EC2 via SSM
        env:
          BUCKET: ${{ env.S3_BUCKET_NAME }}
          INSTANCE: ${{ env.EC2_INSTANCE_ID }}
        run: |
          cat > /tmp/ssm-params.json << JSONEOF
          {
            "InstanceIds": ["${INSTANCE}"],
            "DocumentName": "AWS-RunShellScript",
            "Parameters": {
              "commands": [
                "export PATH=$PATH:/usr/local/bin:/usr/bin:/usr/local/node/bin",
                "aws s3 cp s3://${BUCKET}/deployments/backend-build.zip /home/ec2-user/backend-build.zip",
                "aws s3 cp s3://${BUCKET}/deployments/backend.env /home/ec2-user/app/.env",
                "mkdir -p /home/ec2-user/app",
                "unzip -o /home/ec2-user/backend-build.zip -d /tmp/backend-extract/",
                "cp -r /tmp/backend-extract/backend/dist /home/ec2-user/app/",
                "cp /tmp/backend-extract/backend/package.json /home/ec2-user/app/",
                "cp /tmp/backend-extract/backend/package-lock.json /home/ec2-user/app/",
                "cd /home/ec2-user/app && npm install --omit=dev",
                "pm2 restart hotel-backend || pm2 start /home/ec2-user/app/dist/index.js --name hotel-backend",
                "pm2 save"
              ]
            }
          }
          JSONEOF

          COMMAND_ID=$(aws ssm send-command \
            --cli-input-json file:///tmp/ssm-params.json \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE" || true

          echo "=== STDOUT ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE" \
            --query "StandardOutputContent" \
            --output text

          echo "=== STDERR ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE" \
            --query "StandardErrorContent" \
            --output text
